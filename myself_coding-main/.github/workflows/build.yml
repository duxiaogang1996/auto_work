name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        cd project_app
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        cd project_app
        pyinstaller --name "自动化控制台" --noconfirm --onedir --windowed --add-data "ui;ui/" --paths "." main.py

    - name: Zip output
      run: |
        Compress-Archive -Path "project_app\dist\自动化控制台" -DestinationPath "自动化控制台.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 自动化控制台
        path: 自动化控制台.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: 自动化控制台.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
